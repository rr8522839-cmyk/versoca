<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Checkout | Versoca</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Sticky Navbar -->
  <header class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">VERSOCA</a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="cart.html" class="cart-link">
          Cart
          <span class="cart-icon">🛒</span>
          <span id="cart-count" class="cart-count">0</span>
        </a>
      </nav>
      <button id="mobile-menu-toggle" class="mobile-menu-toggle" aria-label="Toggle navigation">
        ☰
      </button>
    </div>
  </header>

  <!-- Mobile Nav -->
  <nav id="mobile-nav" class="mobile-nav">
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="about.html">About</a>
    <a href="cart.html">
      Cart
      <span id="cart-count-mobile" class="cart-count">0</span>
    </a>
  </nav>

  <main class="page-main">
    <section class="section">
      <div class="section-header">
        <h1>Checkout</h1>
        <p>Complete your details to place your order.</p>
      </div>

      <!-- Confirmation message placeholder -->
      <div id="checkout-message" class="checkout-message"></div>

      <!-- Checkout Form -->
      <form id="checkout-form" class="checkout-form">
        <div class="form-row">
          <div class="form-group">
            <label for="fullName">Full Name</label>
            <input id="fullName" name="fullName" type="text" required />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="phone">Phone</label>
            <input id="phone" name="phone" type="tel" required />
          </div>
          <div class="form-group">
            <label for="city">City</label>
            <input id="city" name="city" type="text" required />
          </div>
        </div>

        <div class="form-group">
          <label for="address">Address</label>
          <textarea id="address" name="address" rows="3" required></textarea>
        </div>

        <div class="form-group">
          <label for="paymentMethod">Payment Method</label>
          <select id="paymentMethod" name="paymentMethod" required>
            <option value="">Select</option>
            <option value="Card">Card</option>
            <option value="UPI">UPI</option>
            <option value="COD">Cash on Delivery (COD)</option>
          </select>
        </div>

        <button type="submit" class="btn primary-btn full-width">Place Order</button>
      </form>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-content">
      <div>
        <h3>Versoca</h3>
        <p>Bold streetwear for the modern generation.</p>
      </div>
      <div>
        <h4>Contact</h4>
        <p>Email: <a href="mailto:contact@versoca.com">contact@versoca.com</a></p>
      </div>
      <div>
        <h4>Follow</h4>
        <p>
          Instagram: <a href="#">@versoca</a><br />
          Twitter: <a href="#">@versoca</a>
        </p>
      </div>
    </div>
    <p class="footer-bottom">© 2026 Versoca. All rights reserved.</p>
  </footer>

  <!-- Scripts -->
  <script src="script.js"></script>
</body>
</html>
